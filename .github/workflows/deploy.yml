name: Deploy Zola Site to GitHub Pages

on:
  push:
    branches:
      - main  # Change to master if your default branch is master

# Grant the permissions required to make a secure Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to prevent race condition errors
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Mandatory to pull the Ametrine submodule contents

      - name: Build Zola Website
        uses: getzola/github-pages@v1
        with:
          zola_version: '0.19.2' # Uses the stable modern version lock

      - name: Upload Static Web Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

